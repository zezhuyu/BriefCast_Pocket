name: Build and Release macOS DMG

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm install

      - name: Build DMG (unsigned)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:dmg:unsigned

      - name: Get version
        id: version
        working-directory: desktop
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: BriefCast v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          prerelease: false
          files: desktop/release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
